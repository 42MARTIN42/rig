<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>RIG | Loading Screen</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/progressbar.js/1.1.0/progressbar.min.js"></script>
        <link rel="stylesheet" href="//code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
        <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
        <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                overflow: hidden !important;
                width: 100%;
                height: 100%;
                background-color: #000;
            }
            #cursor, #loadscreen { display: none; }
        </style>
    </head>
    <body>
        <svg id="cursor" x="0px" y="0px" viewBox="0 0 512 512" style="enable-background:new 0 0 512 512;" xml:space="preserve">
			<polygon style="fill:var(--accent);" points="284.197,328.561 346.079,469.645 297.825,490.812 249.521,512 187.628,370.917 82.26,471.745 82.49,0 429.74,319.313"/>
		</svg>
        <div id="loadscreen">
            <div id="bg1" class="bg_image"></div>
            <div id="bg2" class="bg_image"></div>
        </div>

        <script type="module">
            async function load_loading_manifest() {
                try {
                    const res = await fetch("/ui/loadscreen/manifest.json")
                    const manifest = await res.json()
                    const theme = (localStorage.getItem("theme") || manifest.default_theme || "default");
                    document.body.className = theme;
                    const css_promises = [];
                    if (Array.isArray(manifest.css)) {
                        for (const href of manifest.css) {
                            const link = document.createElement("link")
                            link.rel = "stylesheet"
                            link.href = href.startsWith("/") ? href : "/" + href
                            css_promises.push(new Promise(resolve => {
                                link.onload = resolve;
                                link.onerror = resolve;
                            }));
                            
                            document.head.appendChild(link)
                        }
                    }
                    await Promise.all(css_promises);
                    document.getElementById("loadscreen").style.display = "block";
                    document.getElementById("cursor").style.display = "block";
                    if (Array.isArray(manifest.js)) {
                        for (const src of manifest.js) {
                            const script = document.createElement("script")
                            script.type = "module"
                            script.src = src.startsWith("/") ? src : "/" + src
                            document.body.appendChild(script)
                        }
                    }
                } catch (e) {
                    console.error("loading_manifest loading failed:", e)
                }
            }

            load_loading_manifest()
        </script>
    </body>
</html>
